apiVersion: apps/v1
kind: Deployment
metadata:
  name: egov-simple-react
  labels:
    app.kubernetes.io/name: egov-simple-react
    app.kubernetes.io/part-of: egovframe-template
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: egov-simple-react
  template:
    metadata:
      labels:
        app.kubernetes.io/name: egov-simple-react
        app.kubernetes.io/part-of: egovframe-template
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      containers:
        - name: web
          # Replace with your registry/tag, e.g. ghcr.io/<org>/egov-simple-react:5.0.0
          image: egovframe-template-simple-react:5.0.0
          imagePullPolicy: IfNotPresent
          env:
            # nginx 가 /api/* 요청을 전달할 백엔드 주소.
            # 같은 네임스페이스에 백엔드 Service(egov-simple-backend:8080)가 있다고 가정한다.
            # 클러스터 구성에 맞게 수정한다(예: http://egov-simple-backend.<ns>.svc.cluster.local:8080).
            - name: BACKEND_URL
              value: "http://egov-simple-backend:8080"
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "300m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
            # readOnlyRootFilesystem 환경에서 envsubst 가 BACKEND_URL 을 치환한
            # 설정을 기동 시 기록할 수 있도록 conf.d 를 쓰기 가능 볼륨으로 제공한다.
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-conf
          emptyDir: {}
